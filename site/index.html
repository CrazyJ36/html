<!DOCTYPE html>
<!-- This is A comment, HTML type. You can't use '//' in html, 
     use that in javascript. -->

<html>

    <!--<head></head> - Represents the Metadata of an HTML document.
        In  can contain metadata tags such as: window title, description,
	    and keywords. Common tags included here are: <title>, <link> to css,
		<meta>, <script>, and <style> tags, all enclosed within <head> element.
	-->
    <head>
	
        <!--Link to external .css style file(same directory) to this document-->
        <link rel="stylesheet" href="stylesheet.css">
	
	    <!--Browser Webpage title-->
        <title>Title</title>
	  
	    <!-- You can set styles for individual parts here:
		<head>
			<style>
				h1 { 
				display: block;
				font-size: 2em;
				margin-top: 0.67em;
				}
			</style>
		</head>
		-->

    </head>

    <!--<body></body> - "The" document.-->
    <body>
  
        <!--<header> element is A container for
        introductory content or navigational links.
	    A header(<header>, then <h1>s' within) typically contains:
	    The elements(<h1> - <h6>), site logo or icon, author info.
	    There may be several <header> elements in one document.
	    A <header> tag cannot be placed within A <footer>, <address>,
	    or another <header> element.-->
	    <header>
	
		    <!--<h1> Stands for heading, and is not A header.
			Opening tag <h1>, closing tag </h1>-->
		    <h1>header 1</h1>
			
			<!-- Include links to other pages for naviagtion-->
			Navigation:<br> 
			<a href="http://google.com">A link</a>

		</header>
		
		<!-- <p>: Paragraph block contains simple text/tags relating to text.-->
		<p>
            
			<!--<hr> Horizontal seperator:
			    <hr width="pecent" color="#000000 noshade(solid)>
				Or just do "<br>-----<br>for manual line.-->
			<hr width="90%">

			Start of Paragraph.<br> <!--Paragraph text to show, new-line-->
			
			<!--Programmed variable literal identity, to be used or changed
				in the document without having to type it again. Variables
				support HTML Event Attributes(detect change) and Global
				Attributes. The text within the <var></var> tag is the
				var name and text to insert.
				Variables look Italic in many browsers view.-->
			<var>A variable.</var><var> Another var</var><br><br>
		
		    <!--You can add an ID to whole elements to modify them in css
			or javascript. "codeIntro" definition is in stylesheet.css
			inline style eg: <p color="red">Some code!</p> seems to only
			support one attribute.-->
		    <p id="codeIntro">Some code!</p>
			
			<!--The code tag is intresting in that it show programming code
			in A viewer friendly way, readable just as if it were to be
			compiled. You can use <var> to 'program-the-text' in <code>-->
			<code>int main()<br>
				<!--"&nbsp;" represents and inserts A space. Also see the
				<pre> tag (Preformatted Text)-->
				{<br>&nbsp;&nbsp;char code = statements;<br>}
			</code><br><br>
			  
			<input type="text" id="input">
			<button onclick="myFunc()">btn title</button>
			<br>
			End of paragraph.
			
		</p>

		<p id="IdPar">Last  Paragraph</p>
                  <!--Accessible with id in javascript
		  Using :
                  document.getElementsByTagName(['p', "iDOfParagraph"].innerHtml()
      	          or .getElementById()-->

	<!--SPLIT DOCUMENT INTO SECTIONS-->

    </body>
	  
	<!-- load script after loading html text for speed -->
	<script>
	// comment
	// load javascript
	src="scripts/main.js"

	// function to write directly to html document. 
	// no chars are escaped in javascript. string in quotes
	document.write("doc write: \n :)!") //semicolons optional
	document.write(5) // write int directly no quotes
	document.write(2+2) // arithmetic is processed 
			    // + - / *(?) < > ==
	document.write(5 > 3) // booleans statements 'questions'
			      // return true false
	var var1 = "string"
	document.write(var1)
	var par2 = document.getElementById("IdPar").innerHtml()
	document.write(par2)

	// get user input with document.getElementById().value
	myFunc();
	myFunc2("text1")
	myFunc2("text2") 
	function myFunc() {
	document.write("this is printed from myFunc()")
	}
	function mFunc2(txt) { // might only be able to use ids
	document.write(txt)
	}

	</script>
	
</html>
